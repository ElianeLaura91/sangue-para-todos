<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agendamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="agendamento-container">

  <div class="ag-left">

    <h2>Sangue Para Todos</h2>
    <h3>Agende aqui, User!</h3>
    <p>Realize o agendamento da sua doação aqui!</p>

    <label>Escolha o hemocentro</label>
    <select>
      <option>Hemocentro - HEMOBA</option>
      <option>Hemocentro - Pró-Sangue</option>
    </select>

    <label>Escolha a data</label>

    <div class="calendario-ag">

      <div class="cal-topo">
        <span>&lt;</span>
        <strong>Junho 2026</strong>
        <span>&gt;</span>
      </div>

      <div class="dias">
        <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
      </div>

      <div class="numeros">
        <span></span><span></span><span></span><span></span><span>1</span><span>2</span><span>3</span>
        <span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
        <span>11</span><span>12</span><span>13</span><span>14</span><span>15</span><span>16</span><span>17</span>
        <span>18</span><span>19</span><span>20</span><span>21</span><span>22</span><span>23</span><span>24</span>
        <span>25</span><span>26</span><span>27</span><span>28</span><span>29</span><span>30</span><span></span>
      </div>

    </div>

    <label>Escolha o horário</label>

    <div class="horarios-ag">
      <button>08:00</button>
      <button>09:00</button>
      <button>10:30</button>
      <button>11:15</button>
      <button>12:00</button>
      <button>13:00</button>
      <button>13:30</button>
      <button>15:30</button>
      <button>16:00</button>
      <button>16:20</button>
    </div>

    <button class="btn-ag">Confirmar Agendamento</button>

    <p class="obs">
      Os horários podem mudar conforme demanda
    </p>

  </div>

  <div class="ag-right">
    <img src="telas.png">
  </div>

</div>

</body>
</html>
